version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nfc_postgres
    environment:
      POSTGRES_DB: nfc_payments
      POSTGRES_USER: nfc_user
      POSTGRES_PASSWORD: nfc_secret
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfc_user -d nfc_payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nfc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
